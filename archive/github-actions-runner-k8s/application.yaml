apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: github-actions-runners
  namespace: argo-cd
spec:
  project: spof-cluster
  sources:
    - chart: actions-runner-controller
      repoURL: https://actions-runner-controller.github.io/actions-runner-controller
      targetRevision: v0.23.7
      helm:
        releaseName: actions-runner-controller
        valueFiles:
          - $values/values.yaml
    - repoURL: "https://github.com/SP0Fs/github-actions-runners-k8s.git"
      targetRevision: HEAD
      ref: values
    - repoURL: "https://github.com/SP0Fs/cert-manager-k8s.git"
      targetRevision: HEAD
      path: resources
  destination:
    server: "https://kubernetes.default.svc"
    namespace: github-actions-runner
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
