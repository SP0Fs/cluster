apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: akri
  namespace: argo-cd
spec:
  project: spof-cluster
  sources:
    - chart: akri
      repoURL: https://project-akri.github.io/akri/
      targetRevision: v0.13.8
      helm:
        releaseName: akri
        valueFiles:
          - $values/infra/akri/values.yaml
    - repoURL: "https://github.com/SP0Fs/cluster.git"
      targetRevision: HEAD
      ref: values
  destination:
    server: "https://kubernetes.default.svc"
    namespace: akri
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
