apiVersion: apps/v1
kind: Deployment
metadata:
  name: matrix
  namespace: matrix
  labels:
    app: matrix
spec:
  selector:
    matchLabels:
      app: matrix
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: matrix
    spec:
      containers:
        - name: synapse
          image: matrixdotorg/synapse:v1.127.1
          args:
            - run
            - --config-path=/data/homeserver.yaml
          env:
            - name: TZ
              value: "Europe/Berlin"
            - name: SYNAPSE_DATABASE_HOST
              value: "postgres.postgres.svc.cluster.local"
            - name: SYNAPSE_DATABASE_USER
              value: "synapse"
            - name: SYNAPSE_DATABASE_NAME
              value: "synapse"
            - name: SYNAPSE_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ess-secrets
                  key: db_password
            - name: SYNAPSE_REGISTRATION_SHARED_SECRET
              valueFrom:
                secretKeyRef:
                  name: ess-secrets
                  key: registration_shared_secret
            - name: SYNAPSE_MACAROON_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ess-secrets
                  key: macaroon_secret_key
            - name: SYNAPSE_SIGNING_KEY_PATH
              value: "/data/matrix.leibold.tech.signing.key"
          ports:
            - containerPort: 8008
              name: http
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /data/homeserver.yaml
              subPath: homeserver.yaml
              readOnly: true
            - name: config
              mountPath: /data/log.config
              subPath: log.config
              readOnly: true
            - name: signing-key
              mountPath: /data/matrix.leibold.tech.signing.key
              subPath: signing.key
              readOnly: true
            
          resources:
            requests:
              cpu: 500m
              memory: "512Mi"
            limits:
              cpu: 2
              memory: "2Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: matrix-data
        - name: config
          configMap:
            name: matrix-config
        - name: secrets
          secret:
            secretName: ess-secrets
        - name: signing-key
          secret:
            secretName: ess-secrets
            items:
              - key: signing_key
                path: signing.key
      restartPolicy: Always
